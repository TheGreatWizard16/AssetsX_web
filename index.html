<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssetsX | Sign In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css" />
    <!-- Load Chart.js for authentication page mini-charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body data-page="signin">
    <main class="auth-page">
      <!-- Left Panel: Branding and App Overview -->
      <section class="auth-copy">
        <a class="brand" href="index.html">
          <span class="brand-mark">X</span>
          <span class="brand-name">AssetsX</span>
        </a>
        <p>A cleaner web companion to the mobile app.</p>
        <h1>Sign in to AssetsX</h1>
        <p>Track your portfolio, markets, and alerts from the same account used on mobile.</p>
        <!-- Visual representation of market activity -->
        <div class="card mini-chart-card">
          <canvas id="miniChart" class="chart"></canvas>
        </div>
      </section>

      <!-- Right Panel: Sign In Form -->
      <section class="card auth-card">
        <h2>Welcome back</h2>
        <p>Sign in to continue trading.</p>
        <form id="loginForm" class="form">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="text" placeholder="Enter email" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Password" required>
          </div>
          <div class="form-row">
            <button class="text-link" type="button" data-action="forgot">Forgot password?</button>
          </div>
          <button class="btn primary" type="submit">Sign In</button>
        </form>
        <div class="social-row">
          <button class="btn" type="button" data-action="social-google">Continue with Google</button>
          <button class="btn" type="button" data-action="social-apple">Continue with Apple</button>
        </div>
        <p class="auth-switch">
          No account? <a href="signup.html">Create one</a>
        </p>
        <p class="legal">By continuing you agree to AssetsX terms and privacy policy.</p>
      </section>
    </main>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
