<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssetsX | Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css" />
    <!-- Load Chart.js for real dashboard charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body data-page="home">
    <div class="app-shell">
      <aside class="sidebar">
        <a class="brand" href="home.html">
          <span class="brand-mark">X</span>
          <span class="brand-name">AssetsX</span>
        </a>
        <nav class="side-nav">
          <a class="nav-link active" href="home.html"><span class="nav-icon">⌁</span><span>Home</span></a>
          <a class="nav-link" href="markets.html"><span class="nav-icon">⌁</span><span>Markets</span></a>
          <a class="nav-link" href="portfolio.html"><span class="nav-icon">▰</span><span>Portfolio</span></a>
          <a class="nav-link" href="news.html"><span class="nav-icon">≡</span><span>News</span></a>
          <a class="nav-link" href="pro.html"><span class="nav-icon">⌙</span><span>Pro</span></a>
          <a class="nav-link" href="signin.html" data-action="logout"><span class="nav-icon">⎋</span><span>Logout</span></a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 class="page-title">Home</h1>
            <div id="header-subtitle" class="page-subtitle">Loading market context...</div>
          </div>
          <div class="top-actions">
            <input class="search" type="search" placeholder="Search..." />
          </div>
        </header>

        <section class="content">
          <div class="dashboard-head">
            <h2>Good afternoon, John</h2>
            <p>Portfolio synced from mobile</p>
          </div>

          <!-- Quick Summary Metrics -->
          <div id="metrics-container" class="metrics-grid">
            <!-- Metrics will be filled by main.js -->
          </div>

          <div class="dashboard-grid">
            <!-- Primary Portfolio Performance Chart -->
            <article class="card chart-card">
              <div class="card-head">
                <h3>Portfolio Performance</h3>
                <div class="range-tabs">
                  <span class="pill active">1M</span>
                </div>
              </div>
              <div class="chart-container">
                <canvas id="homeChart" class="chart"></canvas>
              </div>
            </article>

            <!-- Watchlist Sidebar -->
            <aside class="card watchlist">
              <h3>Watchlist</h3>
              <div id="watchlist-container">
                <!-- Filled by main.js -->
              </div>
            </aside>
          </div>

          <!-- Recent Market News Feed -->
          <div id="news-container" class="news-grid">
            <!-- News cards will be filled by main.js -->
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
